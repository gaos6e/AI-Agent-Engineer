# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: AI Agent Engineer
  pageTitleSuffix: " · 从零构建、评测与部署 AI Agent"
  enableSPA: true
  enablePopovers: true
  analytics: null
  locale: zh-CN
  baseUrl: gaos6e.github.io/AI-Agent-Engineer
  ignorePatterns:
    - private
    - templates
    - .obsidian
  defaultDateType: modified
  theme:
    fontOrigin: local
    cdnCaching: false
    typography:
      title: Bahnschrift
      header: Bahnschrift
      body: Microsoft YaHei UI
      code: Cascadia Code
    colors:
      lightMode:
        light: "#F4F9FC"
        lightgray: "#D7E3EC"
        gray: "#71879A"
        darkgray: "#30485E"
        dark: "#091827"
        secondary: "#007FA3"
        tertiary: "#2D5FC7"
        highlight: "rgba(0, 127, 163, 0.12)"
        textHighlight: "rgba(73, 215, 255, 0.24)"
      darkMode:
        light: "#06101D"
        lightgray: "#10233A"
        gray: "#6F879D"
        darkgray: "#AFC2D6"
        dark: "#EAF4FF"
        secondary: "#49D7FF"
        tertiary: "#86E6FF"
        highlight: "rgba(73, 215, 255, 0.12)"
        textHighlight: "rgba(73, 215, 255, 0.24)"
plugins:
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties: []
      excludedProperties: []
      hidePropertiesView: true
      delimiters: "---"
      language: yaml
    order: 5
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      priority:
        - frontmatter
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      comments: true
      highlight: true
      wikilinks: true
      callouts: true
      mermaid: true
      parseTags: false
      parseBlockReferences: true
      enableInHtmlEmbed: false
      enableYouTubeEmbed: true
      enableVideoEmbed: true
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/hard-line-breaks
    enabled: false
    order: 90
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 10
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 5
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 10
      condition: not-index
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 20
  - source: github:quartz-community/footer
    enabled: true
    options:
      links: {}
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
layout:
  groups:
    toolbar:
      priority: 15
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
