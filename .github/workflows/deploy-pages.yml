name: Deploy AI Agent Engineer to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".website/**"
      - ".github/workflows/deploy-pages.yml"
      - "README.md"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ai-agent-engineer-pages
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
      pages: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: .website
    steps:
      - name: Checkout publication repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: .website/package-lock.json

      - name: Scan the publication snapshot before build
        run: npm run scan:repo -- ..

      - name: Install website dependencies
        run: npm ci

      - name: Run publication policy tests
        run: npm test

      - name: Build and validate public artifact
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: .website/public

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
